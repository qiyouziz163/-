<script>
    (function() {

            e.stopPropagation();

                navToggle.innerHTML = '▶';
            } else {
                leftNav.classList.remove('collapsed');
                navToggle.innerHTML = '◀';
            }

        // 通用工具
        function getSystemDate() {
            const d = new Date();
            const year = d.getFullYear();
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const day = d.getDate().toString().padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }

        function guessZipFromAddress(address) {
            if (!address) return '';
            if (address.includes('北京')) return '100000';
            if (address.includes('上海')) return '200000';
            if (address.includes('广州') || address.includes('广东')) return '510000';
            if (address.includes('深圳')) return '518000';
            return '510000';
        }

        function numToChinese(n) {
            const map = ['零','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五'];
            return map[n] || n.toString();
        }

        // 图片压缩
        function compressImage(file, maxSize=300) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width, height = img.height;
                        if (width > height && width > maxSize) {
                            height = Math.round(height * (maxSize / width));
                            width = maxSize;
                        } else if (height > maxSize) {
                            width = Math.round(width * (maxSize / height));
                            height = maxSize;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

            { label: '撤回商标续展注册申请', key: 'item32' },
            { label: '撤回转让/移转申请/注册商标申请', key: 'item33' },
            { label: '撤回商标使用许可备案', key: 'item34' },

            商标类型其他: '',
            otherTrademarkList: [],

            otherText: '',
            委托人地址: '广东省广州市天河区智慧城',

        tmData.邮政编码 = guessZipFromAddress(tmData.委托人地址);

        // ---------- 商标同意转让证明 数据 ----------

            assignee: '广州智创科技有限公司',
            trademarkList: [
                { regNum: '789456', name: '智汇云', class: '9' },
                { regNum: '789457', name: '智汇通', class: '42' }
            ]
        };

        // ---------- 版权数据结构 ----------

                authorName: '陈焕泽',
                idNumber: '440101199001011234',

        const subTabsContainer = document.getElementById('sub-tabs-container');

            navCopyright.classList.toggle('active', module === 'copyright');

            let moduleDisplay = (currentModule === 'copyright') ? '版权' : '商标';

                <div class="sub-tab ${currentSubTab === 'form' ? 'active' : ''}" data-subtab="form">一、填写${moduleDisplay}相关信息</div>

                        renderSubTabs();
                        renderPanel();
                    }
                });
            });

        function renderPanel() {
            if (currentSubTab === 'form') {
                if (currentModule === 'trademark') panelContainer.innerHTML = renderTrademarkForm();

                const identityOther = document.getElementById('tm_identity_other');
                if (identityOther) identityOther.addEventListener('input', e => tmData.委托人身份其他 = e.target.value);
                const agentInp = document.getElementById('tm_agent');
                if (agentInp) agentInp.addEventListener('input', e => tmData.代理机构 = e.target.value);
                const typeSelect = document.getElementById('tm_type');
                if (typeSelect) typeSelect.addEventListener('change', e => { tmData.商标类型 = e.target.value; if (tmData.商标类型 === '其它') { if (!tmData.otherTrademarkList || tmData.otherTrademarkList.length===0) tmData.otherTrademarkList=[{regNum:'',name:'',class:''}]; } else tmData.otherTrademarkList=[]; renderPanel(); });
                const addrInp = document.getElementById('tm_addr');
                if (addrInp) addrInp.addEventListener('input', e => { tmData.委托人地址 = e.target.value; tmData.邮政编码 = guessZipFromAddress(tmData.委托人地址); const zipInp = document.getElementById('tm_zip'); if(zipInp) zipInp.value = tmData.邮政编码; });
                const contactInp = document.getElementById('tm_contact');
                if (contactInp) contactInp.addEventListener('input', e => tmData.联系人 = e.target.value);
                const phoneInp = document.getElementById('tm_phone');
                if (phoneInp) phoneInp.addEventListener('input', e => tmData.电话 = e.target.value);
                const zipInp = document.getElementById('tm_zip');
                if (zipInp) zipInp.addEventListener('input', e => tmData.邮政编码 = e.target.value);
                const otherTextInp = document.getElementById('tm_other_text');
                if (otherTextInp) otherTextInp.addEventListener('input', e => tmData.otherText = e.target.value);
                document.querySelectorAll('.other-tm-row input').forEach(inp => { inp.addEventListener('input', e => { const idx = e.target.dataset.index; const field = e.target.dataset.field; if (idx!==undefined && field && tmData.otherTrademarkList && tmData.otherTrademarkList[idx]) tmData.otherTrademarkList[idx][field] = e.target.value; }); });
                document.querySelectorAll('.remove-btn').forEach(btn => { btn.addEventListener('click', e => { e.preventDefault(); const idx = e.target.dataset.index; if (idx!==undefined && tmData.otherTrademarkList) { tmData.otherTrademarkList.splice(idx,1); if (tmData.otherTrademarkList.length===0) tmData.otherTrademarkList.push({regNum:'',name:'',class:''}); renderPanel(); } }); });
                const addBtn = document.getElementById('addOtherTmBtn');
                if (addBtn) addBtn.addEventListener('click', e => { e.preventDefault(); if (!tmData.otherTrademarkList) tmData.otherTrademarkList=[]; tmData.otherTrademarkList.push({regNum:'',name:'',class:''}); renderPanel(); });
                document.querySelectorAll('#tm-issues-group input[type=checkbox]').forEach(cb => { cb.addEventListener('change', e => { const key = e.target.dataset.issueKey; if (key) { tmData.事宜[key] = e.target.checked; if (key==='item38' && !e.target.checked) tmData.otherText=''; renderPanel(); } }); });
                const searchInput = document.getElementById('tm_issue_search');
                if (searchInput) { searchInput.addEventListener('input', function(e) { const keyword = e.target.value.trim().toLowerCase(); const items = document.querySelectorAll('#tm-issues-group .checkbox-item'); items.forEach(item => { const span = item.querySelector('span'); const text = span ? span.textContent.toLowerCase() : ''; const match = keyword === '' || text.includes(keyword); item.style.display = match ? '' : 'none'; const next = item.nextElementSibling; if (next && next.classList.contains('other-input')) next.style.display = match ? '' : 'none'; }); }); }
            } else if (currentModule === 'assign') {
                const assignorInp = document.getElementById('assign_assignor');
                if (assignorInp) assignorInp.addEventListener('input', e => assignData.assignor = e.target.value);
                const assigneeInp = document.getElementById('assign_assignee');
                if (assigneeInp) assigneeInp.addEventListener('input', e => assignData.assignee = e.target.value);
                document.querySelectorAll('.other-tm-row input').forEach(inp => {
                    inp.addEventListener('input', e => {
                        const idx = e.target.dataset.index;
                        const field = e.target.dataset.field;
                        if (idx !== undefined && field && assignData.trademarkList && assignData.trademarkList[idx]) {
                            assignData.trademarkList[idx][field] = e.target.value;
                        }
                    });
                });
                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', e => {
                        e.preventDefault();
                        const idx = e.target.dataset.index;
                        if (idx !== undefined && assignData.trademarkList) {
                            assignData.trademarkList.splice(idx, 1);
                            if (assignData.trademarkList.length === 0) assignData.trademarkList.push({ regNum: '', name: '', class: '' });
                            renderPanel();
                        }
                    });
                });
                const addBtn = document.getElementById('addAssignTmBtn');
                if (addBtn) addBtn.addEventListener('click', e => { e.preventDefault(); assignData.trademarkList.push({ regNum: '', name: '', class: '' }); renderPanel(); });
            } else if (currentModule === 'copyright') {
                document.getElementById('cp_authorName')?.addEventListener('input', e => cpData.common.authorName = e.target.value);
                document.getElementById('cp_idNumber')?.addEventListener('input', e => cpData.common.idNumber = e.target.value);
                document.getElementById('cp_nationality')?.addEventListener('input', e => cpData.common.nationality = e.target.value);
                document.getElementById('cp_province')?.addEventListener('input', e => cpData.common.province = e.target.value);
                document.getElementById('cp_city')?.addEventListener('input', e => cpData.common.city = e.target.value);
                document.querySelectorAll('input[name="rightOwnership"]').forEach(r => r.addEventListener('change', e => {
                    cpData.common.rightOwnership = e.target.value;
                    renderPanel();
                }));
                cpData.works.forEach((_, idx) => {
                    document.querySelectorAll(`.work-title[data-index="${idx}"]`).forEach(inp => inp.addEventListener('input', e => cpData.works[idx].title = e.target.value));
                    document.querySelectorAll(`.work-completionDate[data-index="${idx}"]`).forEach(inp => inp.addEventListener('input', e => cpData.works[idx].completionDate = e.target.value));
                    document.querySelectorAll(`.work-completionCity[data-index="${idx}"]`).forEach(inp => inp.addEventListener('input', e => cpData.works[idx].completionCity = e.target.value));
                    document.querySelectorAll(`.work-firstPubDate[data-index="${idx}"]`).forEach(inp => inp.addEventListener('input', e => cpData.works[idx].firstPubDate = e.target.value));
                    document.querySelectorAll(`.work-pubCity[data-index="${idx}"]`).forEach(inp => inp.addEventListener('input', e => cpData.works[idx].pubCity = e.target.value));
                    document.querySelectorAll(`.work-purpose[data-index="${idx}"]`).forEach(inp => inp.addEventListener('input', e => cpData.works[idx].createPurpose = e.target.value));
                    document.querySelectorAll(`.work-process[data-index="${idx}"]`).forEach(inp => inp.addEventListener('input', e => cpData.works[idx].createProcess = e.target.value));
                    document.querySelectorAll(`.work-originality[data-index="${idx}"]`).forEach(inp => inp.addEventListener('input', e => cpData.works[idx].originalityStatement = e.target.value));
                    document.querySelectorAll(`.work-category[data-index="${idx}"]`).forEach(cb => cb.addEventListener('change', function(e) {
                        if (this.checked) {
                            document.querySelectorAll(`.work-category[data-index="${idx}"]`).forEach(c => { if (c !== this) c.checked = false; });
                            cpData.works[idx].category = this.value;
                        } else {
                            if (!Array.from(document.querySelectorAll(`.work-category[data-index="${idx}"]:checked`)).length) {
                                document.querySelector(`.work-category[data-index="${idx}"][value="文字"]`).checked = true;
                                cpData.works[idx].category = '文字';
                            }
                        }
                    }));
                });
                document.querySelectorAll('.upload-images').forEach(input => {
                    input.addEventListener('change', async (e) => {
                        const idx = e.target.dataset.index;
                        const files = Array.from(e.target.files);
                        for (let file of files) {
                            let compressed = await compressImage(file, 300);
                            cpData.works[idx].images.push(compressed);
                        }
                        renderPanel();
                    });
                });
                document.querySelectorAll('.remove-work').forEach(btn => {
                    btn.addEventListener('click', e => {
                        let idx = e.target.dataset.removeIndex;
                        if (idx && cpData.works.length > 1) {
                            cpData.works.splice(idx, 1);
                            renderPanel();
                        }
                    });
                });
                document.getElementById('addNewWorkBtn')?.addEventListener('click', () => {
                    let newWork = JSON.parse(JSON.stringify(cpData.works[0]));
                    newWork.title = '新作品';
                    newWork.images = [];
                    cpData.works.push(newWork);
                    renderPanel();
                });
            }
        }

                const BODY_SIZE = 24;

                    link.download = `版权申请表_${getSystemDate().replace(/[年月日]/g, '')}.docx`;

                } else if (currentModule === 'trademark') {

                            let runs;
                            if (item.key === 'item38' && isChecked) {
                                runs = [ new TextRun({ text: '☑ 其他: ', bold: true, underline: { type: UnderlineType.SINGLE }, font: BODY_FONT, size: BODY_SIZE }), new TextRun({ text: tmData.otherText || '______', underline: { type: UnderlineType.SINGLE }, bold: true, font: BODY_FONT, size: BODY_SIZE }) ];
                            } else {
                                runs = [ new TextRun({ text: mark + ' ', bold: isChecked, underline: isChecked ? { type: UnderlineType.SINGLE } : undefined, font: BODY_FONT, size: BODY_SIZE }), new TextRun({ text: item.label.replace(/<br>/g, ''), bold: isChecked, underline: isChecked ? { type: UnderlineType.SINGLE } : undefined, font: BODY_FONT, size: BODY_SIZE }) ];
                            }
                            rightCell = new TableCell({ children: [ new Paragraph({ children: runs }) ] });
                        }
                        tableRows.push(new TableRow({ children: [ leftCell, rightCell ] }));
                    }
                    let issuesTable = new Table({

                        width: { size: 100, type: docx.WidthType.PERCENTAGE },

                        new Paragraph({ children: [ new TextRun('电　　话: '), new TextRun({ text: tmData.电话, underline: { type: UnderlineType.SINGLE }, font: BODY_FONT, size: BODY_SIZE }) ] }),
                        new Paragraph({ children: [ new TextRun('邮政 编 码: '), new TextRun({ text: tmData.邮政编码, underline: { type: UnderlineType.SINGLE }, font: BODY_FONT, size: BODY_SIZE }) ] })
                    ]});
                    let rightCell = new TableCell({ children: [
                        new Paragraph({ children: [ new TextRun({ text: '          委托人章戳: ', bold: true, color: 'FF0000', font: BODY_FONT, size: BODY_SIZE }), new TextRun({ text: '____________________', bold: true, font: BODY_FONT, size: BODY_SIZE }) ] }),
                        new Paragraph({ alignment: AlignmentType.RIGHT, children: [ new TextRun({ text: tmData.签章日期, underline: { type: UnderlineType.SINGLE }, font: BODY_FONT, size: BODY_SIZE }) ] })

                    URL.revokeObjectURL(link.href);

                } else if (currentModule === 'assign') {
                    // 商标同意转让证明下载
                    const list = assignData.trademarkList || [];
                    const total = list.length;

        // 单独下载法人作品创作声明
        async function downloadCorpStatement() {

                    alert('docx库未加载，请刷新页面重试');
                    return;
                }
                const { Document, Packer, Paragraph, TextRun, UnderlineType, AlignmentType } = docx;
                const BODY_FONT = "SimSun";
                const BODY_SIZE = 28;
                let children = [];
                let works = cpData.works;
                for (let i = 0; i < works.length; i++) {
                    if (i > 0) children.push(new Paragraph({ children: [], pageBreakBefore: true }));
                    let work = works[i];
                    let corpName = cpData.common.authorName;
                    let date = getSystemDate();
                    children.push(
                        new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: '法人作品创作声明', bold: true, font: BODY_FONT, size: 36 })] }),

                            new TextRun({ text: '由', font: BODY_FONT, size: BODY_SIZE }),
                            new TextRun({ text: corpName, underline: { type: UnderlineType.SINGLE }, font: BODY_FONT, size: BODY_SIZE }),

                            new TextRun({ text: '享有。', font: BODY_FONT, size: BODY_SIZE })
                        ] }),
                        new Paragraph({ children: [
                            new TextRun({ text: corpName, underline: { type: UnderlineType.SINGLE }, font: BODY_FONT, size: BODY_SIZE }),

            }
        }

        // 导航事件
        navTrademark.addEventListener('click', () => { currentModule='trademark'; currentSubTab='form'; setActiveNav('trademark'); renderSubTabs(); renderPanel(); });
        navAssign.addEventListener('click', () => { currentModule='assign'; currentSubTab='form'; setActiveNav('assign'); renderSubTabs(); renderPanel(); });
        navCopyright.addEventListener('click', () => { currentModule='copyright'; currentSubTab='form'; setActiveNav('copyright'); renderSubTabs(); renderPanel(); });

        // 初始化
        setActiveNav('trademark');
        renderSubTabs();
        renderPanel();
    })();
