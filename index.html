<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>企优咨 · 内部办公系统 </title>
    <!-- 引入 docx 库 -->
    <script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        #app {
            width: 100%;
            max-width: 1600px;
            height: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .app-header {
            background: #1e2b3c;
            color: white;
            padding: 18px 28px;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #2d3f50;
            display: flex;
            align-items: center;
        }
        .app-header::before {
            content: "⚖️";
            margin-right: 12px;
            font-size: 2rem;
        }
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            background: #f9fafc;
        }
        .left-nav {
            width: 240px;
            background: white;
            border-right: 1px solid #e6e9f0;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
        }
        .nav-item {
            padding: 16px 24px;
            margin: 0 12px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-item i { font-style: normal; font-size: 1.4rem; }
        .nav-item:hover { background: #f0f4fe; color: #1e4f8a; }
        .nav-item.active {
            background: #1e4f8a;
            color: white;
            box-shadow: 0 6px 12px rgba(30,79,138,0.2);
        }
        .right-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f9fafc;
        }
        .sub-tabs {
            display: flex;
            background: white;
            padding: 0 28px;
            border-bottom: 1px solid #eef2f6;
            gap: 32px;
        }
        .sub-tab {
            padding: 18px 8px 14px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #6b7a8d;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.15s;
        }
        .sub-tab.active {
            color: #1e4f8a;
            border-bottom-color: #1e4f8a;
        }
        .panel-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            background: #f9fafc;
        }
        .form-panel, .preview-panel {
            width: 100%;
            height: 100%;
        }
        .preview-panel {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            padding: 28px 24px;
            overflow-y: auto;
            border: 1px solid #edf2f7;
        }
        .form-card {
            background: white;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
            border: 1px solid #edf2f7;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
            gap: 20px 28px;
        }
        .field-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #44566c;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9e0e8;
            border-radius: 16px;
            font-size: 0.95rem;
            background: white;
            transition: 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.1);
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 28px;
            border: 1px solid #eef2f6;
            padding: 20px;
            border-radius: 20px;
            background: #fbfdff;
        }
        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            width: calc(50% - 20px);
            font-weight: normal;
            transition: font-weight 0.1s;
            line-height: 1.4;
        }
        .checkbox-item.checked {
            font-weight: 700;
        }
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1e4f8a;
            margin-top: 3px;
            flex-shrink: 0;
        }
        .other-input {
            margin-left: 26px;
            margin-top: 8px;
            width: calc(100% - 26px);
        }
        .btn {
            background: #1e4f8a;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 14px rgba(30,79,138,0.2);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn:hover { background: #123b63; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .word-icon::after { content: "📄"; margin-left: 8px; }

        /* 预览样式 */
        .preview-doc {
            font-family: 'Times New Roman', Times, serif;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            line-height: 1.6;
            color: #1e2b3c;
            font-size: 16px;
        }
        .doc-title {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            margin: 0 0 20px 0;
        }
        .underline-field {
            display: inline-block;
            font-weight: 700;
            text-decoration: underline;
            padding: 0 2px;
        }
        .signature-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 40px;
            border: 1px solid #a0b8cc;
        }
        .signature-table td {
            border: 1px solid #a0b8cc;
            padding: 12px 16px;
        }
        .selected-item {
            font-weight: 700;
            text-decoration: underline;
        }
        .red-bold {
            font-weight: 700;
            color: red;
        }
        /* 多商标条目样式 */
        .other-tm-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            background: #f5f8ff;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #dde3ed;
        }
        .other-tm-row input {
            flex: 1;
            min-width: 0;
            background: white;
        }
        .other-tm-row .remove-btn {
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 30px;
            width: 32px;
            height: 32px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .other-tm-row .remove-btn:hover {
            background: #b71c1c;
        }
        .add-btn {
            margin-top: 10px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .add-btn:hover {
            background: #1b5e20;
        }
        /* 搜索框样式 */
        .search-issue {
            width: 220px;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #d9e0e8;
            background: white;
            font-size: 0.9rem;
        }
        .search-issue:focus {
            border-color: #1e4f8a;
            box-shadow: 0 0 0 3px rgba(30,79,138,0.1);
            outline: none;
        }
        .total-badge {
            background: #e9ecf3;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 600;
            color: #1e2b3c;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="app-header">企优咨 · 内部办公系统</div>
    <div class="main-layout">
        <div class="left-nav">
            <div class="nav-item active" data-module="trademark" id="nav-trademark"><i>™️</i> 商标代理委托书</div>
            <!-- 商标同意转让证明 -->
            <div class="nav-item" data-module="assign" id="nav-assign"><i>📜</i> 商标同意转让证明</div>
            <div class="nav-item" data-module="copyright" id="nav-copyright"><i>©️</i> 国家版权作品登记申请表</div>
        </div>
        <div class="right-content" id="right-content">
            <div class="sub-tabs" id="sub-tabs-container"></div>
            <div class="panel-container" id="panel-container"></div>
        </div>
    </div>
</div>
<script>
    (function() {
        let currentModule = 'trademark';    // 'trademark', 'copyright', 'assign'
        let currentSubTab = 'form';

        const identityOptions = ['中国', '中国香港', '中国澳门', '中国台湾', '其它'];
        const trademarkTypeOptions = ['文字', '图形', '组合', '其它'];

        const trademarkIssuesList = [
            { label: '商标注册申请', key: 'item1' },
            { label: '商标异议申请', key: 'item2' },
            { label: '商标异议答辩', key: 'item3' },
            { label: '更正商标申请/注册事项申请', key: 'item4' },
            { label: '变更商标申请人/注册人名义/地址<br>变更集体商标/证明商标管理规则/集体成员名单申请', key: 'item5' },
            { label: '变更商标代理人/文件接收人申请', key: 'item6' },
            { label: '删减商品/服务项目申请', key: 'item7' },
            { label: '商标续展注册申请', key: 'item8' },
            { label: '转让/移转申请/注册商标申请', key: 'item9' },
            { label: '商标使用许可备案', key: 'item10' },
            { label: '变更许可人/被许可人名称备案', key: 'item11' },
            { label: '商标使用许可提前终止备案', key: 'item12' },
            { label: '商标专用权质权登记申请', key: 'item13' },
            { label: '商标专用权质权登记事项变更申请', key: 'item14' },
            { label: '商标专用权质权登记期限延期申请', key: 'item15' },
            { label: '商标专用权质权登记证补发申请', key: 'item16' },
            { label: '商标专用权质权登记注销申请', key: 'item17' },
            { label: '商标注销申请', key: 'item18' },
            { label: '撤销连续三年不使用注册商标申请', key: 'item19' },
            { label: '撤销成为商品/服务通用名称注册商标申请', key: 'item20' },
            { label: '撤销连续三年不使用注册商标提供证据', key: 'item21' },
            { label: '撤销成为商品/服务通用名称注册商标答辩', key: 'item22' },
            { label: '补发变更/转让/续展证明申请', key: 'item23' },
            { label: '补发商标注册证申请', key: 'item24' },
            { label: '出具商标注册证明申请', key: 'item25' },
            { label: '出具优先权证明文件申请', key: 'item26' },
            { label: '撤回商标注册申请', key: 'item27' },
            { label: '撤回商标异议申请', key: 'item28' },
            { label: '撤回变更商标申请人/注册人名义/地址<br>变更集体商标/证明商标管理规则/集体成员名单申请', key: 'item29' },
            { label: '撤回变更商标代理人/文件接收人申请', key: 'item30' },
            { label: '撤回删减商品/服务项目申请', key: 'item31' },
            { label: '撤回商标续展注册申请', key: 'item32' },
            { label: '撤回转让/移转申请/注册商标申请', key: 'item33' },
            { label: '撤回商标使用许可备案', key: 'item34' },
            { label: '撤回商标注销申请', key: 'item35' },
            { label: '撤回撤销连续三年不使用注册商标申请', key: 'item36' },
            { label: '撤回撤销成为商品/服务通用名称注册商标申请', key: 'item37' },
            { label: '其他', key: 'item38' }
        ];

        function getSystemDate() {
            const d = new Date();
            const year = d.getFullYear();
            const month = (d.getMonth() + 1).toString().padStart(2, '0');
            const day = d.getDate().toString().padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }

        function guessZipFromAddress(address) {
            if (!address) return '';
            if (address.includes('北京')) return '100000';
            if (address.includes('上海')) return '200000';
            if (address.includes('广州') || address.includes('广东')) return '510000';
            if (address.includes('深圳')) return '518000';
            return '510000';
        }

        // 商标代理数据
        let tmData = {
            委托人名称: '陈焕泽',
            委托人身份: '中国',
            委托人身份其他: '',
            代理机构: '企优咨(广州)咨询有限公司',
            商标类型: '图形',
            商标类型其他: '',
            otherTrademarkList: [],
            事宜: Object.fromEntries(trademarkIssuesList.map(item => [item.key, false])),
            otherText: '',
            委托人地址: '广东省广州市天河区智慧城',
            联系人: '陈焕泽',
            电话: '13246650235',
            邮政编码: '510000',
            签章日期: getSystemDate()
        };
        updateZipFromAddress();

        function updateZipFromAddress() {
            tmData.邮政编码 = guessZipFromAddress(tmData.委托人地址);
        }

        // 版权数据
        let cpData = {
            作品名称: '智慧办公系统',
            作品类别: '文字',
            著作权人姓名: '陈焕泽',
            证件号码: '440101199001011234',
            国籍: '中国',
            省份: '广东省',
            城市: '广州市',
            创作完成日期: '2025年02月01日',
            创作完成地点: '广州',
            发表状态: '已发表',
            首次发表日期: '2025年02月10日',
            发表国家: '中国',
            发表城市: '广州',
            权利取得方式: '原始',
            权利归属: '个人作品',
            创作目的: '内部办公无纸化',
            创作过程: '自主设计开发',
            独创性声明: '本作品由本人独立创作完成',
            美术图片说明: '（示例图片说明）'
        };

        // ========== 商标同意转让证明数据 ==========
        // 不再存储日期字段，全部使用系统当前日期
        let assignData = {
            assignor: '陈焕泽',
            assignee: '广州智创科技有限公司',
            trademarkList: [
                { regNum: '789456', name: '智汇云', class: '9' },
                { regNum: '789457', name: '智汇通', class: '42' }
            ]
        };

        // 辅助：计算商标总件数
        function getAssignTotalCount() {
            return assignData.trademarkList.length;
        }

        // 导航元素
        const navTrademark = document.getElementById('nav-trademark');
        const navAssign = document.getElementById('nav-assign');
        const navCopyright = document.getElementById('nav-copyright');
        const subTabsContainer = document.getElementById('sub-tabs-container');
        const panelContainer = document.getElementById('panel-container');

        function setActiveNav(module) {
            navTrademark.classList.toggle('active', module === 'trademark');
            navAssign.classList.toggle('active', module === 'assign');
            navCopyright.classList.toggle('active', module === 'copyright');
        }

        function renderSubTabs() {
            let moduleDisplay = (currentModule === 'copyright') ? '版权' : '商标';
            subTabsContainer.innerHTML = `
                <div class="sub-tab ${currentSubTab === 'form' ? 'active' : ''}" data-subtab="form">一、填写${moduleDisplay}相关信息</div>
                <div class="sub-tab ${currentSubTab === 'preview' ? 'active' : ''}" data-subtab="preview">二、预览页面</div>
            `;
            document.querySelectorAll('.sub-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const sub = e.target.dataset.subtab;
                    if (sub) {
                        currentSubTab = sub;
                        renderSubTabs();
                        renderPanel();
                    }
                });
            });
        }

        function renderPanel() {
            if (currentSubTab === 'form') {
                if (currentModule === 'trademark') panelContainer.innerHTML = renderTrademarkForm();
                else if (currentModule === 'copyright') panelContainer.innerHTML = renderCopyrightForm();
                else if (currentModule === 'assign') panelContainer.innerHTML = renderAssignForm();
                attachFormListeners();
            } else {
                let previewHtml = '';
                if (currentModule === 'trademark') previewHtml = renderTrademarkPreview();
                else if (currentModule === 'copyright') previewHtml = renderCopyrightPreview();
                else if (currentModule === 'assign') previewHtml = renderAssignPreview();
                panelContainer.innerHTML = `<div class="preview-panel">${previewHtml}</div>`;
                const downloadBtnHtml = `<div style="text-align:right; margin-top:24px;"><button class="btn" id="downloadWordBtn">一键生成Word文件 <span class="word-icon"></span></button></div>`;
                panelContainer.innerHTML += downloadBtnHtml;
                document.getElementById('downloadWordBtn')?.addEventListener('click', downloadWord);
            }
        }

        // ---------- 商标代理委托书表单 (保留完整功能) ----------
        function renderTrademarkForm() {
            let identityOptionsHtml = identityOptions.map(opt => `<option value="${opt}" ${tmData.委托人身份 === opt ? 'selected' : ''}>${opt}</option>`).join('');
            const showIdentityOther = tmData.委托人身份 === '其它';
            let typeOptionsHtml = trademarkTypeOptions.map(opt => `<option value="${opt}" ${tmData.商标类型 === opt ? 'selected' : ''}>${opt}</option>`).join('');
            const showTypeOther = tmData.商标类型 === '其它';
            let otherTmHtml = '';
            if (showTypeOther) {
                if (!tmData.otherTrademarkList || tmData.otherTrademarkList.length === 0) {
                    tmData.otherTrademarkList = [{ regNum: '', name: '', class: '' }];
                }
                let rows = '';
                tmData.otherTrademarkList.forEach((item, idx) => {
                    rows += `<div class="other-tm-row" data-index="${idx}"><input type="text" class="other-reg" placeholder="注册号" value="${item.regNum}" data-index="${idx}" data-field="regNum"><input type="text" class="other-name" placeholder="商标名称" value="${item.name}" data-index="${idx}" data-field="name"><input type="text" class="other-class" placeholder="类别" value="${item.class}" data-index="${idx}" data-field="class"><button class="remove-btn" data-index="${idx}" type="button">✕</button></div>`;
                });
                otherTmHtml = `<div style="margin-top:20px; border-top:1px dashed #ccc; padding-top:16px;"><div class="field-label">📌 其它商标明细 (第______号 “______” (__类) )</div>${rows}<button class="add-btn" id="addOtherTmBtn" type="button">➕ 添加商标</button></div>`;
            }
            let issuesHtml = '';
            trademarkIssuesList.forEach((item) => {
                const checked = tmData.事宜[item.key];
                const checkedClass = checked ? 'checked' : '';
                issuesHtml += `<div class="checkbox-item ${checkedClass}"><input type="checkbox" data-issue-key="${item.key}" ${checked ? 'checked' : ''}> <span>${item.label.replace(/<br>/g, '<br>')}</span></div>`;
                if (item.key === 'item38' && checked) {
                    issuesHtml += `<div class="other-input"><input type="text" id="tm_other_text" placeholder="请填写具体内容" value="${tmData.otherText}"></div>`;
                }
            });
            return `<div class="form-card"><div class="form-grid"><div><div class="field-label">委托人名称</div><input type="text" id="tm_name" value="${tmData.委托人名称}" placeholder="例: 陈焕泽"></div><div><div class="field-label">委托人身份</div><select id="tm_identity">${identityOptionsHtml}</select>${showIdentityOther ? '<input type="text" id="tm_identity_other" style="margin-top:10px;" placeholder="请填写具体身份" value="'+tmData.委托人身份其他+'">' : ''}</div><div><div class="field-label">代理机构</div><input type="text" id="tm_agent" value="${tmData.代理机构}"></div><div><div class="field-label">商标类型</div><select id="tm_type">${typeOptionsHtml}</select></div><div><div class="field-label">委托人地址</div><input type="text" id="tm_addr" value="${tmData.委托人地址}"></div><div><div class="field-label">联系人</div><input type="text" id="tm_contact" value="${tmData.联系人}"></div><div><div class="field-label">电话</div><input type="text" id="tm_phone" value="${tmData.电话}"></div><div><div class="field-label">邮政编码</div><input type="text" id="tm_zip" value="${tmData.邮政编码}" placeholder="根据地址自动填充"></div></div>${otherTmHtml}<div style="display: flex; justify-content: space-between; align-items: center; margin-top:24px;"><div class="field-label" style="margin-bottom:0;">委托事宜 (可多选)</div><input type="text" id="tm_issue_search" class="search-issue" placeholder="搜索事宜..." autocomplete="off"></div><div class="checkbox-group" id="tm-issues-group" style="display: flex; flex-wrap: wrap;">${issuesHtml}</div></div>`;
        }
        function renderTrademarkPreview() {

                                ] }) ],
                                borders: { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE }, insideHorizontal: { style: BorderStyle.NONE }, insideVertical: { style: BorderStyle.NONE } },
                            })
                        ]
                    }]
                });
                const blob = await Packer.toBlob(doc);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `商标同意转让证明_${assignData.assignor}_${today.replace(/年|月|日/g, '')}.docx`;
                link.click();
                URL.revokeObjectURL(link.href);
            } else {
                alert('该模块暂不支持下载');
            }
        }

        // 导航事件
        navTrademark.addEventListener('click', () => {
            currentModule = 'trademark';
            currentSubTab = 'form';
            setActiveNav('trademark');
            renderSubTabs();
            renderPanel();
        });
        navAssign.addEventListener('click', () => {
            currentModule = 'assign';
            currentSubTab = 'form';
            setActiveNav('assign');
            renderSubTabs();
            renderPanel();
        });
        navCopyright.addEventListener('click', () => {
            currentModule = 'copyright';
            currentSubTab = 'form';
            setActiveNav('copyright');
            renderSubTabs();
            renderPanel();
        });

        // 初始化
        setActiveNav('trademark');
        renderSubTabs();
        renderPanel();
    })();
</script>
